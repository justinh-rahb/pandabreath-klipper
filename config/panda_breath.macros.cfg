[gcode_macro M141]
description: Set chamber temperature with Panda Breath
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET={s}

[gcode_macro M191]
description: Wait for chamber temperature with Panda Breath
gcode:
    {% set s = params.S|default(0)|float %}
    M141 S{s}
    {% if s > 0 %}
        TEMPERATURE_WAIT SENSOR="heater_generic panda_breath" MINIMUM={s}
    {% endif %}
